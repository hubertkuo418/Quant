dataset_config: "configs/smoke/dataset.yaml"
artifacts_dir: "artifacts/smoke/baselines"
random_seed: 42

ridge_alpha: 1.0
momentum_feature: "return_20d"

random_forest:
  n_estimators: 20
  max_depth: 4
  min_samples_leaf: 5

xgboost:
  n_estimators: 20
  max_depth: 3
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8

lightgbm:
  n_estimators: 20
  max_depth: 3
  learning_rate: 0.05
  num_leaves: 15
  min_child_samples: 20

mlp:
  hidden_dims: [32, 16]
  dropout: 0.1
  learning_rate: 0.001
  weight_decay: 0.0001
  epochs: 2
  patience: 2
  batch_size: 64
