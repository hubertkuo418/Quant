dataset_config: "configs/smoke/dataset.yaml"
artifacts_dir: "artifacts/smoke/transformer"
random_seed: 42
target_horizon: null

model:
  d_model: 16
  num_heads: 2
  num_layers: 1
  feedforward_dim: 32
  dropout: 0.1

training:
  learning_rate: 0.001
  weight_decay: 0.0001
  epochs: 2
  patience: 2
  batch_size: 64
  gradient_clip: 1.0
  correlation_loss_weight: 0.1
