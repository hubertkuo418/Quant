dataset_config: "configs/dataset.yaml"
artifacts_dir: "artifacts/baselines"
random_seed: 42

ridge_alpha: 1.0
momentum_feature: "return_20d"

random_forest:
  n_estimators: 200
  max_depth: 6
  min_samples_leaf: 5

xgboost:
  n_estimators: 300
  max_depth: 4
  learning_rate: 0.03
  subsample: 0.8
  colsample_bytree: 0.8

lightgbm:
  n_estimators: 300
  max_depth: 4
  learning_rate: 0.03
  num_leaves: 31
  min_child_samples: 20

mlp:
  hidden_dims: [128, 64]
  dropout: 0.2
  learning_rate: 0.001
  weight_decay: 0.0001
  epochs: 50
  patience: 7
  batch_size: 128
